name: E2E test

on:
    push:
        branches:
            - develop
            - main
    pull_request:
    workflow_call:

jobs:
    e2e:
        runs-on: ubuntu-latest

        env:
            COMPOSER_AUTH: '{"github-oauth": {"github.com": "${{ secrets.COMPOSER_TOKEN }}"}}'

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                submodules: 'true'

            - name: Install slic
              run: |
                git clone https://github.com/stellarwp/slic.git "$HOME/slic"
                echo "$HOME/slic" >> $GITHUB_PATH

            - name: Configure slic target
              run: |
                cd "$GITHUB_WORKSPACE/.."
                slic here
                slic use "$(basename "$GITHUB_WORKSPACE")"

            - name: Install dependencies
              run: |
                slic composer install --no-dev --no-scripts
                slic composer run strauss-release
                slic npm install --legacy-peer-deps

            - name: Build plugin
              run: slic npm run build

            - name: Start slic stack
              run: slic up

            - name: Install Playwright Browsers
              run: slic playwright install

            - name: Run E2E Test
              run: slic playwright test --config tests/e2e/playwright.config.js

            - uses: actions/upload-artifact@v4
              if: always()
              with:
                    name: E2E Test Report
                    path: tests/e2e/test-results
                    retention-days: 2
