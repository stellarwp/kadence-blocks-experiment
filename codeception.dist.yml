actor: Tester
bootstrap: _bootstrap.php
paths:
    tests: tests/php
    log: tests/php/_output
    output: tests/php/_output
    data: tests/php/_data
    helpers: tests/php/_support
    wp_root: '%WP_ROOT_FOLDER%'
settings:
    colors: true
    memory_limit: 1024M
params:
    # read dynamic configuration parameters from the .env file
    - .env.testing
